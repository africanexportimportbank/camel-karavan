camel.main.name=${projectId}
camel.main.description=${projectName}
camel.jbang.gav=org.apache.camel.karavan.demo:${projectId}:1
camel.jbang.runtime=quarkus
camel.jbang.quarkusVersion=3.27.0
camel.jbang.excludes=*.md
camel.jbang.health=true
# Quarkus extensions added to the generated pom: container-image-jib builds the image,
# quarkus-kubernetes generates + (with -Dquarkus.kubernetes.deploy) applies the manifests.
camel.jbang.dependencies=camel:microprofile-health,mvn:io.quarkus:quarkus-container-image-jib,mvn:io.quarkus:quarkus-kubernetes
camel.health.enabled=true
quarkus.container-image.group=karavan
quarkus.container-image.name=${projectId}
quarkus.container-image.insecure=true
quarkus.kubernetes.service-account=karavan
quarkus.kubernetes.image-pull-policy=Always
quarkus.kubernetes.labels."app.kubernetes.io/runtime"=camel
quarkus.kubernetes.labels."org.apache.camel.karavan/runtime"=quarkus
# Karavan tracking labels so PodEventHandler associates the deployed pod with the project
# (projectId) and types it as the running app (packaged) -> it is listed in Containers.
quarkus.kubernetes.labels."org.apache.camel.karavan/projectId"=${projectId}
quarkus.kubernetes.labels."org.apache.camel.karavan/type"=packaged
