{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "karavan.postgres.fullname" . }}
  labels:
    {{- include "karavan.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "karavan.postgres.fullname" . }}
  labels:
    {{- include "karavan.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storage | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "karavan.postgres.fullname" . }}
  labels:
    {{- include "karavan.labels" . | nindent 4 }}
    app: {{ include "karavan.postgres.fullname" . }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ include "karavan.postgres.fullname" . }}
  template:
    metadata:
      labels:
        {{- include "karavan.labels" . | nindent 8 }}
        app: {{ include "karavan.postgres.fullname" . }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          envFrom:
            - secretRef:
                name: {{ include "karavan.postgres.fullname" . }}
          env:
            # Keep PGDATA in a subdir so the PVC mount root (lost+found etc.) does
            # not collide with initdb on some volume provisioners.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.username | quote }}, "-d", {{ .Values.postgres.database | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.username | quote }}, "-d", {{ .Values.postgres.database | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "karavan.postgres.fullname" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "karavan.postgres.fullname" . }}
  labels:
    {{- include "karavan.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "karavan.postgres.fullname" . }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
{{- end }}
