{{- if .Values.registry.createSecret }}
# The "karavan" registry Secret. In Kubernetes the app's RegistryService reads
# registry config from the image-* keys, and the build pod reads the
# karavan.container-image.* keys (builder.pod.jkube.yaml secretKeyRef). Both
# point at the same registry. Without this Secret, project builds fail.
#
# The name MUST be "karavan" (matches karavan.secret.name default and the
# hardcoded secretKeyRef name in builder.pod.jkube.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "karavan.fullname" . }}
  labels:
    {{- include "karavan.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Read by the app (RegistryService) in Kubernetes:
  image-registry: {{ .Values.registry.server | quote }}
  image-group: {{ .Values.registry.group | quote }}
  image-registry-username: {{ .Values.registry.username | quote }}
  image-registry-password: {{ .Values.registry.password | quote }}
  # Read by the build pod (builder.pod.jkube.yaml secretKeyRef name: karavan):
  karavan.container-image.registry: {{ .Values.registry.server | quote }}
  karavan.container-image.group: {{ .Values.registry.group | quote }}
  karavan.container-image.registry-username: {{ .Values.registry.username | quote }}
  karavan.container-image.registry-password: {{ .Values.registry.password | quote }}
{{- end }}
