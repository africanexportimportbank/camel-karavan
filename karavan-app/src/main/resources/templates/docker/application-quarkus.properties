camel.main.name=${projectId}
camel.main.description=${projectName}
camel.jbang.gav=org.apache.camel.karavan.demo:${projectId}:1
camel.jbang.runtime=quarkus
camel.jbang.quarkusVersion=3.27.0
camel.jbang.excludes=*.md
camel.jbang.health=true
# container-image-jib builds + pushes the image; the app starts the container from it.
camel.jbang.dependencies=camel:microprofile-health,mvn:io.quarkus:quarkus-container-image-jib
camel.health.enabled=true
quarkus.container-image.group=karavan
quarkus.container-image.name=${projectId}
quarkus.container-image.insecure=true
