{{- if .Values.registry.inCluster.enabled }}
# Optional provider-agnostic in-cluster OCI registry (CNCF Distribution).
# Builds push here and the cluster pulls from here — no ECR token refresh and no
# per-project repo pre-creation (Distribution creates repos implicitly on push).
#
# IMPORTANT (image pull): the kubelet/containerd must be able to pull from this
# registry. Point .Values.registry.server at the address nodes can reach:
#   * Docker Desktop / single-node: works as-is via the Service name + port.
#   * EKS / managed nodes: the registry must be HTTPS with a node-trusted cert
#     (e.g. exposed through the existing ALB + ACM cert), OR containerd must be
#     told it is insecure (a hosts.toml DaemonSet). Plain in-cluster HTTP is not
#     pullable by managed nodes without that node-level config.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "karavan.fullname" . }}-registry
  labels:
    {{- include "karavan.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.registry.inCluster.storage | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "karavan.fullname" . }}-registry
  labels:
    {{- include "karavan.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "karavan.fullname" . }}-registry
  template:
    metadata:
      labels:
        {{- include "karavan.labels" . | nindent 8 }}
        app: {{ include "karavan.fullname" . }}-registry
    spec:
      containers:
        - name: registry
          image: {{ .Values.registry.inCluster.image | quote }}
          ports:
            - containerPort: 5000
              name: registry
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              memory: "512Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "karavan.fullname" . }}-registry
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.registry.inCluster.serviceName }}
  labels:
    {{- include "karavan.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "karavan.fullname" . }}-registry
  ports:
    - name: registry
      port: {{ .Values.registry.inCluster.port }}
      targetPort: 5000
{{- end }}
