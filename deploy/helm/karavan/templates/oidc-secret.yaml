{{- if and (eq .Values.auth.type "oidc") (not .Values.auth.oidc.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "karavan.oidc.secretName" . }}
  labels:
    {{- include "karavan.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-id: {{ required "auth.oidc.clientId is required when auth.type=oidc (or set auth.oidc.existingSecret)" .Values.auth.oidc.clientId | quote }}
  client-secret: {{ required "auth.oidc.clientSecret is required when auth.type=oidc (or set auth.oidc.existingSecret)" .Values.auth.oidc.clientSecret | quote }}
{{- end }}
