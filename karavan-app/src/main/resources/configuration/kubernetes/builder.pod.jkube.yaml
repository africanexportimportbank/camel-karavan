spec:
  containers:
    - env:
        - name: PROJECT_ID
          value: ${projectId}
        - name: TAG
          value: ${tag}
        - name: IMAGE_REGISTRY
          valueFrom:
            secretKeyRef:
              name: karavan
              key: karavan.container-image.registry
        - name: IMAGE_REGISTRY_USERNAME
          valueFrom:
            secretKeyRef:
              name: karavan
              key: karavan.container-image.registry-username
        - name: IMAGE_REGISTRY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: karavan
              key: karavan.container-image.registry-password
        - name: IMAGE_GROUP
          valueFrom:
            secretKeyRef:
              name: karavan
              key: karavan.container-image.group
        # GIT_REPOSITORY/USERNAME/PASSWORD/BRANCH are injected per build from the
        # project's own remote + the owner's credentials (see ProjectService /
        # KubernetesService.getBuilderPod envVars), not from a shared secret.